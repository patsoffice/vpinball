[configuration]
id = "ChannelVol"
name = "Channel Volume"
description = "Per-table OS-level audio channel volume control for backglass and SSF speakers"
author = "VPX dev team"
version = "1.0"
link = "https://github.com/vpinball/vpinball"

[libraries]
windows.x86 = "plugin-channelvol.dll"
windows.x64 = "plugin-channelvol64.dll"
linux.x64 = "plugin-channelvol.so"
linux.aarch64 = "plugin-channelvol.so"
macos.x64 = "plugin-channelvol.dylib"
macos.arm64 = "plugin-channelvol.dylib"
